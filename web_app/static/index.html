<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT_OS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root { --green: #00ff41; --dim: #003b00; --bg: #000; }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── terminal container ── */
        .terminal {
            width: 100%;
            max-width: 680px;
            border: 1px solid var(--green);
            border-radius: 12px;
            padding: 32px 36px 36px;
            position: relative;
            box-shadow: 0 0 32px rgba(0,255,65,.08), inset 0 0 32px rgba(0,255,65,.02);
        }

        /* traffic-light dots */
        .dots {
            display: flex;
            gap: 7px;
            margin-bottom: 28px;
        }
        .dot {
            width: 11px; height: 11px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        /* ── boot log ── */
        .boot-log { margin-bottom: 28px; min-height: 120px; }

        .log-line {
            font-size: .78rem;
            letter-spacing: .04em;
            line-height: 1.9;
            color: var(--green);
            opacity: 0;
            white-space: pre;
        }
        .log-line.dim { color: var(--dim); }
        .log-line.visible { opacity: 1; }

        /* ── welcome block ── */
        .welcome { margin-bottom: 36px; opacity: 0; transition: opacity .6s; }
        .welcome.visible { opacity: 1; }

        .welcome-name {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: bold;
            letter-spacing: .06em;
            margin-bottom: 6px;
            text-shadow: 0 0 12px rgba(0,255,65,.5);
        }

        .tagline {
            font-size: .82rem;
            color: #00aa2a;
            letter-spacing: .06em;
        }

        /* ── cursor ── */
        .cursor {
            display: inline-block;
            width: 9px; height: 1.1em;
            background: var(--green);
            vertical-align: text-bottom;
            animation: blink .85s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* ── button ── */
        .btn {
            display: inline-block;
            padding: 13px 28px;
            font-family: inherit;
            font-size: .82rem;
            font-weight: bold;
            letter-spacing: .16em;
            color: #000;
            background: var(--green);
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity .5s, transform .5s, background .2s;
            text-shadow: none;
        }
        .btn.visible { opacity: 1; transform: translateY(0); }
        .btn:hover { background: #fff; }

        /* ── inner screens ── */
        .screen { width: 100%; max-width: 680px; }
        .hidden { display: none !important; }

        .s-label {
            font-size: .65rem;
            color: #006010;
            letter-spacing: .2em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .ritual-msg {
            font-size: 1rem;
            line-height: 1.8;
            color: #00cc33;
            font-style: italic;
            margin-bottom: 40px;
            text-shadow: 0 0 8px rgba(0,255,65,.2);
        }

        .nav-link {
            font-size: .72rem;
            color: #006010;
            cursor: pointer;
            letter-spacing: .08em;
            background: none;
            border: none;
            font-family: inherit;
            text-decoration: underline;
            transition: color .2s;
        }
        .nav-link:hover { color: var(--green); }

        textarea.input {
            width: 100%;
            height: 140px;
            resize: none;
            background: transparent;
            border: 1px solid #004a00;
            color: var(--green);
            font-family: inherit;
            font-size: .9rem;
            padding: 12px;
            outline: none;
            margin-bottom: 16px;
            transition: border-color .2s;
        }
        textarea.input:focus { border-color: var(--green); }
        textarea.input::placeholder { color: #003300; }

        .seed-q { font-size: .8rem; color: #006010; margin-bottom: 16px; line-height: 1.6; }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 13px;
            font-family: inherit;
            font-size: .78rem;
            font-weight: bold;
            letter-spacing: .14em;
            color: #000;
            background: var(--green);
            border: none;
            cursor: pointer;
            margin-bottom: 14px;
            transition: background .2s;
        }
        .submit-btn:hover { background: #fff; }

        /* map */
        .map-title { font-size: .9rem; font-weight: bold; letter-spacing: .2em; margin-bottom: 24px; }

        .pillars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            gap: 8px;
            margin-bottom: 28px;
        }

        .pillar-card { border: 1px solid #003300; padding: 14px 12px; }
        .pillar-name { font-size: .7rem; font-weight: bold; letter-spacing: .08em; margin-bottom: 4px; }
        .pillar-status { font-size: .58rem; letter-spacing: .15em; color: #005500; }
    </style>
</head>
<body>

<!-- ══ GREETING ══ -->
<div id="screen-greeting">
    <div class="terminal">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

        <div class="boot-log" id="boot-log"></div>

        <div class="welcome" id="welcome-block">
            <div class="welcome-name">Welcome, Neo.</div>
            <div class="tagline">Ready to invest in yourself?</div>
        </div>

        <button class="btn" id="begin-btn" onclick="enterApp()">[ BEGIN JOURNEY ]</button>
    </div>
</div>

<!-- ══ RITUAL ══ -->
<div id="screen-ritual" class="screen hidden">
    <div class="terminal">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="s-label">// morning ritual</div>
        <div id="morning-view">
            <div id="morning-message" class="ritual-msg">"..."</div>
            <button class="nav-link" onclick="showEvening()">evening journal →</button>
            &nbsp;&nbsp;
            <button class="nav-link" onclick="showMap()">pillar map →</button>
        </div>
        <div id="evening-view" class="hidden">
            <div class="s-label">// evening reflection</div>
            <div id="seed-question" class="seed-q"></div>
            <textarea id="journal-input" class="input" placeholder="> write here..."></textarea>
            <button class="submit-btn" onclick="submitJournal()">[ SUBMIT ]</button>
            <button class="nav-link" onclick="showMorning()">← back</button>
        </div>
    </div>
</div>

<!-- ══ MAP ══ -->
<div id="screen-map" class="screen hidden">
    <div class="terminal">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="map-title">// PILLAR MAP</div>
        <div id="pillars-grid" class="pillars-grid"></div>
        <button class="nav-link" onclick="showRitual()">← ritual</button>
    </div>
</div>

<script>
    const PILLARS = ["Social", "Financial", "Spiritual", "Craft/Career", "Emotional/Intimacy", "Intellectual", "Legacy"];

    const MORNING_MESSAGES = [
        "Welcome to Day 1. Your journey begins with a single step. Go do one thing today that the man you want to be would do.",
        "The Stoics taught that clarity comes from action, not from thinking.",
        "Discipline is the bridge between goals and accomplishment.",
        "The Spartans knew that a man alone is a target, but a man with a tribe is a force.",
        "Marcus Aurelius proved that true security comes from the strength of the mind, not the size of the treasury.",
        "The man who moves a mountain begins by carrying away small stones.",
        "You do not rise to the level of your goals. You fall to the level of your systems."
    ];

    const SEED_QUESTIONS = [
        "Who in your life actually pushes you to be better, and who is just taking up space?",
        "If your income vanished tomorrow, how many days could you survive?",
        "When was the last time you felt peace without a screen or distraction?",
        "What is one skill you'd spend 10,000 hours mastering just for pride?",
        "Do the people closest to you feel seen and heard by you?",
        "What belief did you hold for years that you now know is wrong?",
        "If you disappeared tomorrow, what would the world actually miss?"
    ];

    /* ── boot sequence ── */
    const BOOT_LINES = [
        { text: '> ARCHITECT_OS v1.0',          delay: 0,    pause: 320 },
        { text: '> LOADING CORE MODULES',        delay: 0,    pause: 0   },
        { text: '  [■■■■■■■■■■■■■■■■■■■■] OK',  delay: 480,  pause: 200 },
        { text: '> SCANNING USER PROFILE',       delay: 0,    pause: 0   },
        { text: '  [■■■■■■■■■■■■■■■■■■■■] OK',  delay: 560,  pause: 200 },
        { text: '> ESTABLISHING CONNECTION',     delay: 0,    pause: 0   },
        { text: '  [■■■■■■■■■■■■■■■■■■■■] OK',  delay: 400,  pause: 200 },
        { text: '> DECRYPTING IDENTITY...',      delay: 0,    pause: 640 },
        { text: '  STATUS: AUTHORIZED',          delay: 0,    pause: 800 },
    ];

    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function typewriterLine(el, text, charDelay = 28) {
        el.classList.add('visible');
        for (let i = 0; i <= text.length; i++) {
            el.textContent = text.slice(0, i);
            await sleep(charDelay);
        }
    }

    async function runBoot() {
        const log = document.getElementById('boot-log');
        // add cursor line
        const cursorEl = document.createElement('div');
        cursorEl.className = 'log-line visible';
        cursorEl.innerHTML = '<span class="cursor"></span>';
        log.appendChild(cursorEl);

        let cumDelay = 200;
        for (const line of BOOT_LINES) {
            await sleep(line.delay || 0);
            const el = document.createElement('div');
            el.className = 'log-line';
            log.insertBefore(el, cursorEl);
            await typewriterLine(el, line.text, 22);
            await sleep(line.pause || 0);
        }

        // remove cursor, reveal welcome + button
        cursorEl.remove();
        await sleep(300);
        document.getElementById('welcome-block').classList.add('visible');
        await sleep(500);
        document.getElementById('begin-btn').classList.add('visible');
    }

    runBoot();

    /* ── navigation ── */
    function hideAll() {
        document.getElementById('screen-greeting').classList.add('hidden');
        document.getElementById('screen-ritual').classList.add('hidden');
        document.getElementById('screen-map').classList.add('hidden');
    }

    function enterApp() {
        hideAll();
        document.getElementById('screen-ritual').classList.remove('hidden');
        showMorning();
        const msg = MORNING_MESSAGES[Math.floor(Math.random() * MORNING_MESSAGES.length)];
        document.getElementById('morning-message').textContent = `"${msg}"`;
    }

    function showRitual() {
        hideAll();
        document.getElementById('screen-ritual').classList.remove('hidden');
        showMorning();
    }

    function showMorning() {
        document.getElementById('morning-view').classList.remove('hidden');
        document.getElementById('evening-view').classList.add('hidden');
    }

    function showEvening() {
        document.getElementById('morning-view').classList.add('hidden');
        document.getElementById('evening-view').classList.remove('hidden');
        const q = SEED_QUESTIONS[Math.floor(Math.random() * SEED_QUESTIONS.length)];
        document.getElementById('seed-question').textContent = q;
    }

    function submitJournal() {
        document.getElementById('journal-input').value = '';
        showRitual();
    }

    function showMap() {
        hideAll();
        document.getElementById('screen-map').classList.remove('hidden');
        const grid = document.getElementById('pillars-grid');
        grid.innerHTML = '';
        PILLARS.forEach(name => {
            const card = document.createElement('div');
            card.className = 'pillar-card';
            card.innerHTML = `<div class="pillar-name">${name.toUpperCase()}</div><div class="pillar-status">PAUSED</div>`;
            grid.appendChild(card);
        });
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'm') showMap();
        if (e.key === 'r') showRitual();
    });
</script>
</body>
</html>
