<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT_OS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            color: #e5e5e5;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* subtle scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,.07) 2px,
                rgba(0,0,0,.07) 4px
            );
            pointer-events: none;
            z-index: 999;
        }

        .screen { width: 100%; max-width: 420px; }

        /* ── shared util ── */
        .hidden { display: none !important; }

        /* ── OS header ── */
        .os-header { margin-bottom: 40px; }
        .os-title {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: bold;
            letter-spacing: .15em;
            color: #fff;
        }
        .os-subtitle { font-size: .75rem; color: #555; letter-spacing: .1em; margin-top: 4px; }

        /* ── welcome block ── */
        .welcome-line {
            font-size: clamp(1.4rem, 5vw, 1.9rem);
            font-weight: bold;
            color: #fff;
            margin-bottom: 6px;
        }
        .tagline { font-size: .85rem; color: #666; margin-bottom: 32px; }

        /* ── error banner ── */
        .error-msg {
            font-size: .8rem;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 8px 14px;
            margin-bottom: 20px;
            letter-spacing: .04em;
        }

        /* ── form inputs ── */
        .field {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #e5e5e5;
            font-family: inherit;
            font-size: .95rem;
            padding: 12px 0;
            margin-bottom: 20px;
            outline: none;
            transition: border-color .2s;
        }
        .field::placeholder { color: #444; }
        .field:focus { border-bottom-color: #fff; }

        /* ── buttons ── */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-family: inherit;
            font-size: .85rem;
            font-weight: bold;
            letter-spacing: .12em;
            cursor: pointer;
            border: none;
            transition: opacity .2s;
            margin-bottom: 12px;
        }
        .btn:hover { opacity: .85; }
        .btn-primary { background: #fff; color: #000; }
        .btn-secondary { background: transparent; color: #e5e5e5; border: 1px solid #333; }
        .btn:disabled { opacity: .4; cursor: not-allowed; }

        .link-later {
            display: block;
            text-align: center;
            font-size: .75rem;
            color: #444;
            cursor: pointer;
            letter-spacing: .08em;
            margin-top: 8px;
            transition: color .2s;
        }
        .link-later:hover { color: #888; }

        /* ── ritual / dashboard screens ── */
        .ritual-header {
            font-size: .65rem;
            letter-spacing: .2em;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 28px;
        }
        .ritual-message {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #ccc;
            font-style: italic;
            margin-bottom: 40px;
        }
        .ritual-btn {
            font-size: .75rem;
            color: #555;
            cursor: pointer;
            letter-spacing: .08em;
            background: none;
            border: none;
            font-family: inherit;
            text-decoration: underline;
        }
        .ritual-btn:hover { color: #ccc; }

        textarea.field {
            height: 160px;
            resize: none;
            border: 1px solid #222;
            padding: 14px;
            margin-bottom: 20px;
        }
        textarea.field:focus { border-color: #555; }

        /* ── pillar map ── */
        .map-title {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: .15em;
            color: #fff;
            margin-bottom: 28px;
        }
        .pillars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 28px;
        }
        .pillar-card {
            border: 1px solid #1a1a1a;
            padding: 18px 14px;
            transition: border-color .2s;
        }
        .pillar-card.moving { border-color: #e5e5e5; }
        .pillar-name { font-size: .8rem; font-weight: bold; letter-spacing: .08em; margin-bottom: 6px; }
        .pillar-status { font-size: .65rem; letter-spacing: .15em; color: #555; }
        .pillar-card.moving .pillar-status { color: #e5e5e5; }

        .user-line {
            font-size: .7rem;
            color: #444;
            letter-spacing: .08em;
            margin-bottom: 40px;
        }
        .user-line span { color: #888; }
    </style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="screen-auth" class="screen">
    <div class="os-header">
        <div class="os-title">ARCHITECT_OS <span style="color:#444">v1.0</span></div>
        <div class="os-subtitle">SOVEREIGN LIFE DESIGN SYSTEM</div>
    </div>

    <div class="welcome-line" id="welcome-name">Welcome, Neo.</div>
    <div class="tagline">Ready to invest in yourself?</div>

    <div id="auth-error" class="error-msg hidden"></div>

    <!-- shared fields -->
    <input id="field-email" class="field" type="email" placeholder="email" autocomplete="email" />
    <input id="field-password" class="field" type="password" placeholder="password" autocomplete="current-password" />

    <!-- register-only name field -->
    <input id="field-name" class="field hidden" type="text" placeholder="your name" autocomplete="name" />

    <button id="btn-login" class="btn btn-primary" onclick="doLogin()">[ LOGIN ]</button>
    <button id="btn-register" class="btn btn-secondary" onclick="switchToRegister()">[ CREATE ACCOUNT ]</button>
    <span class="link-later" onclick="skipAuth()">later</span>
</div>

<!-- register mode replaces the buttons; same fields, different action -->

<!-- ══ RITUAL SCREEN ══ -->
<div id="screen-ritual" class="screen hidden">
    <div class="os-header">
        <div class="os-title">ARCHITECT_OS <span style="color:#444">v1.0</span></div>
    </div>
    <div class="user-line" id="ritual-user-line"></div>

    <div id="morning-view">
        <div class="ritual-header">// morning ritual</div>
        <div id="morning-message" class="ritual-message">"Loading..."</div>
        <button class="ritual-btn" onclick="showEvening()">evening journal →</button>
        &nbsp;&nbsp;
        <button class="ritual-btn" onclick="showMap()">pillar map →</button>
    </div>

    <div id="evening-view" class="hidden">
        <div class="ritual-header">// evening reflection</div>
        <div id="seed-question" class="tagline" style="margin-bottom:20px"></div>
        <textarea id="journal-input" class="field" placeholder="write here..."></textarea>
        <button class="btn btn-primary" onclick="submitJournal()">[ SUBMIT ]</button>
        <button class="ritual-btn" style="margin-top:12px" onclick="showMorning()">← back</button>
    </div>
</div>

<!-- ══ MAP SCREEN ══ -->
<div id="screen-map" class="screen hidden">
    <div class="os-header">
        <div class="os-title">ARCHITECT_OS <span style="color:#444">v1.0</span></div>
    </div>
    <div class="user-line" id="map-user-line"></div>
    <div class="map-title">// PILLAR MAP</div>
    <div id="pillars-grid" class="pillars-grid"></div>
    <button class="ritual-btn" onclick="showRitual()">← ritual</button>
</div>

<script>
    let userId = null;
    let userName = "Neo";
    let registerMode = false;

    const SEED_QUESTIONS = [
        "Who in your life actually pushes you to be better, and who is just taking up space?",
        "If your income vanished tomorrow, how many days could you survive?",
        "When was the last time you felt peace without a screen or distraction?",
        "What is one skill you'd spend 10,000 hours mastering just for pride?",
        "Do the people closest to you feel seen and heard by you?",
        "What belief did you hold for years that you now know is wrong?",
        "If you disappeared tomorrow, what would the world actually miss?"
    ];

    function showError(msg) {
        const el = document.getElementById('auth-error');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    function clearError() {
        document.getElementById('auth-error').classList.add('hidden');
    }

    function switchToRegister() {
        registerMode = true;
        document.getElementById('field-name').classList.remove('hidden');
        document.getElementById('field-password').setAttribute('autocomplete', 'new-password');
        document.getElementById('btn-login').textContent = '[ CREATE ACCOUNT ]';
        document.getElementById('btn-login').onclick = doRegister;
        document.getElementById('btn-register').textContent = '← back to login';
        document.getElementById('btn-register').onclick = switchToLogin;
        document.getElementById('welcome-name').textContent = 'Create your account.';
        clearError();
    }

    function switchToLogin() {
        registerMode = false;
        document.getElementById('field-name').classList.add('hidden');
        document.getElementById('field-password').setAttribute('autocomplete', 'current-password');
        document.getElementById('btn-login').textContent = '[ LOGIN ]';
        document.getElementById('btn-login').onclick = doLogin;
        document.getElementById('btn-register').textContent = '[ CREATE ACCOUNT ]';
        document.getElementById('btn-register').onclick = switchToRegister;
        document.getElementById('welcome-name').textContent = 'Welcome, Neo.';
        clearError();
    }

    async function doLogin() {
        const email = document.getElementById('field-email').value.trim();
        const password = document.getElementById('field-password').value;
        if (!email || !password) { showError('Email and password are required.'); return; }
        clearError();
        setBusy(true);
        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        setBusy(false);
        if (!res.ok) {
            const d = await res.json();
            showError(d.detail || 'Wrong email or password.');
            return;
        }
        const data = await res.json();
        userId = data.user_id;
        userName = data.name || email.split('@')[0];
        showRitual();
    }

    async function doRegister() {
        const email = document.getElementById('field-email').value.trim();
        const password = document.getElementById('field-password').value;
        const name = document.getElementById('field-name').value.trim();
        if (!email || !password) { showError('Email and password are required.'); return; }
        if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
        clearError();
        setBusy(true);
        const res = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, name })
        });
        setBusy(false);
        if (res.status === 409) { showError('Account already exists.'); switchToLogin(); return; }
        if (!res.ok) { const d = await res.json(); showError(d.detail || 'Registration failed.'); return; }
        const data = await res.json();
        userId = data.user_id;
        userName = data.name || email.split('@')[0];
        showRitual();
    }

    function skipAuth() {
        userId = null;
        userName = "Guest";
        showRitual();
    }

    function setBusy(busy) {
        document.getElementById('btn-login').disabled = busy;
        document.getElementById('btn-register').disabled = busy;
    }

    function setUserLine(id) {
        const txt = userId ? `user: <span>${userName}</span>` : `user: <span>guest</span>`;
        document.getElementById(id).innerHTML = txt;
    }

    async function showRitual() {
        hideAll();
        document.getElementById('screen-ritual').classList.remove('hidden');
        showMorning();
        setUserLine('ritual-user-line');

        const url = userId ? `/ritual/morning/${userId}` : null;
        if (url) {
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('morning-message').textContent = `"${data.message}"`;
        } else {
            document.getElementById('morning-message').textContent =
                '"Begin your journey. Create an account to track your pillars and unlock your morning ritual."';
        }
    }

    function showMorning() {
        document.getElementById('morning-view').classList.remove('hidden');
        document.getElementById('evening-view').classList.add('hidden');
    }

    function showEvening() {
        document.getElementById('morning-view').classList.add('hidden');
        document.getElementById('evening-view').classList.remove('hidden');
        const q = SEED_QUESTIONS[Math.floor(Math.random() * SEED_QUESTIONS.length)];
        document.getElementById('seed-question').textContent = q;
    }

    async function submitJournal() {
        if (!userId) { showRitual(); return; }
        const content = document.getElementById('journal-input').value.trim();
        if (!content) return;
        await fetch('/ritual/evening', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, content })
        });
        document.getElementById('journal-input').value = '';
        showRitual();
    }

    async function showMap() {
        hideAll();
        document.getElementById('screen-map').classList.remove('hidden');
        setUserLine('map-user-line');

        const grid = document.getElementById('pillars-grid');
        grid.innerHTML = '';

        if (!userId) {
            grid.innerHTML = '<p style="color:#444;font-size:.8rem">Sign in to view your pillar map.</p>';
            return;
        }

        const res = await fetch(`/user/pillars/${userId}`);
        const pillars = await res.json();
        pillars.forEach(p => {
            const card = document.createElement('div');
            card.className = `pillar-card${p.status === 'Moving' ? ' moving' : ''}`;
            card.innerHTML = `
                <div class="pillar-name">${p.name.toUpperCase()}</div>
                <div class="pillar-status">${p.status.toUpperCase()}</div>
            `;
            grid.appendChild(card);
        });
    }

    function hideAll() {
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-ritual').classList.add('hidden');
        document.getElementById('screen-map').classList.add('hidden');
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'm' && userId) showMap();
        if (e.key === 'r') showRitual();
        if (e.key === 'Escape') {
            hideAll();
            document.getElementById('screen-auth').classList.remove('hidden');
        }
    });
</script>
</body>
</html>
