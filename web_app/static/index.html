<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #e5e5e5;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .hidden { display: none !important; }

        /* ── WELCOME SCREEN ───────────────────────────── */
        #screen-welcome {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
        }

        .terminal-box {
            border: 1px solid #00ff41;
            border-radius: 12px;
            padding: 3rem 3.5rem;
            max-width: 540px;
            width: 100%;
            background: #000;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.08), inset 0 0 60px rgba(0, 255, 65, 0.03);
            position: relative;
        }

        .terminal-topbar {
            position: absolute;
            top: 14px;
            left: 20px;
            display: flex;
            gap: 7px;
        }

        .terminal-dot { width: 10px; height: 10px; border-radius: 50%; background: #222; }

        .terminal-line {
            color: #00ff41;
            font-size: 0.95rem;
            line-height: 2;
            min-height: 1.9em;
        }

        .terminal-line.dim { color: #004d14; }

        .cursor {
            display: inline-block;
            width: 9px;
            height: 1.1em;
            background: #00ff41;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .welcome-actions {
            margin-top: 2.5rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            opacity: 0;
            transition: opacity 0.6s;
        }

        .btn-yes {
            padding: 0.75rem 2rem;
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s;
        }

        .btn-yes:hover { background: #00ff41; color: #000; }

        .btn-later {
            background: none;
            border: none;
            color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-later:hover { color: #555; }

        /* ── RITUAL SCREEN ────────────────────────────── */
        #screen-ritual {
            width: 100%;
            max-width: 680px;
            padding: 2rem 1rem;
        }

        .ritual-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #00ff41;
            margin-bottom: 2rem;
            display: block;
        }

        #morning-message {
            font-family: Georgia, serif;
            font-size: 1.35rem;
            line-height: 1.85;
            color: #d4d4d4;
            margin-bottom: 3rem;
            border-left: 2px solid #00ff41;
            padding-left: 1.5rem;
        }

        .text-btn {
            background: none;
            border: none;
            color: #444;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .text-btn:hover { color: #00ff41; }

        /* ── EVENING VIEW ─────────────────────────────── */
        #seed-question {
            font-family: Georgia, serif;
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        #journal-input {
            width: 100%;
            height: 200px;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 8px;
            color: #e5e5e5;
            font-family: Georgia, serif;
            font-size: 1rem;
            line-height: 1.7;
            padding: 1.2rem 1.4rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        #journal-input:focus { border-color: #00ff41; }

        .submit-btn {
            margin-top: 1.2rem;
            padding: 0.8rem 2.5rem;
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .submit-btn:hover { background: #00ff41; color: #000; }

        /* ── MAP SCREEN ───────────────────────────────── */
        #screen-map {
            width: 100%;
            max-width: 900px;
            padding: 2rem 1rem;
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid #111;
            padding-bottom: 1.2rem;
        }

        .map-title {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #00ff41;
        }

        #pillars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        .pillar-card {
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 1.5rem;
            transition: border-color 0.3s, transform 0.2s;
        }

        .pillar-card:hover { transform: translateY(-3px); border-color: #333; }
        .pillar-card.active { border-color: #00ff41; }

        .pillar-name { font-size: 0.85rem; letter-spacing: 0.08em; color: #ccc; margin-bottom: 0.5rem; }

        .pillar-status { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; }
        .pillar-status.moving { color: #00ff41; }
        .pillar-status.paused { color: #333; }
    </style>
</head>
<body>

    <!-- WELCOME SCREEN -->
    <div id="screen-welcome">
        <div class="terminal-box">
            <div class="terminal-topbar">
                <div class="terminal-dot"></div>
                <div class="terminal-dot"></div>
                <div class="terminal-dot"></div>
            </div>
            <div style="margin-top: 1rem;">
                <div class="terminal-line dim">> ARCHITECT_OS v1.0</div>
                <div class="terminal-line" id="wl-1"></div>
                <div class="terminal-line" id="wl-2"></div>
                <div class="terminal-line" id="wl-cursor"><span class="cursor"></span></div>
            </div>
            <!-- Auth form (hidden until animation ends) -->
            <div id="auth-box" style="opacity:0; transition: opacity 0.6s; margin-top: 2rem;">
                <div id="auth-error" style="color:#ff4444; font-size:0.8rem; margin-bottom:0.8rem; min-height:1.2em;"></div>
                <input id="auth-email" type="email" placeholder="email" autocomplete="email"
                    style="width:100%; background:transparent; border:none; border-bottom:1px solid #00ff41; color:#00ff41;
                           font-family:'Courier New',monospace; font-size:0.95rem; padding:0.5rem 0; outline:none; margin-bottom:1rem;"/>
                <input id="auth-password" type="password" placeholder="password" autocomplete="current-password"
                    style="width:100%; background:transparent; border:none; border-bottom:1px solid #00ff41; color:#00ff41;
                           font-family:'Courier New',monospace; font-size:0.95rem; padding:0.5rem 0; outline:none; margin-bottom:2rem;"/>
                <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
                    <button class="btn-yes" onclick="doLogin()">[ LOGIN ]</button>
                    <button class="btn-yes" onclick="doRegister()">[ CREATE ACCOUNT ]</button>
                    <button class="btn-later">later</button>
                </div>
            </div>
        </div>
    </div>

    <!-- RITUAL SCREEN -->
    <div id="screen-ritual" class="hidden">
        <div id="morning-view" class="hidden">
            <span class="ritual-label">> morning_ritual.exe</span>
            <p id="morning-message">Loading your story...</p>
            <button class="text-btn" onclick="showEvening()">[ evening journal ]</button>
        </div>
        <div id="evening-view" class="hidden">
            <span class="ritual-label">> evening_reflection.exe</span>
            <p id="seed-question">How was your day?</p>
            <textarea id="journal-input" placeholder="Write here..."></textarea>
            <div><button class="submit-btn" onclick="submitJournal()">[ SUBMIT ]</button></div>
        </div>
    </div>

    <!-- MAP SCREEN -->
    <div id="screen-map" class="hidden">
        <div class="map-header">
            <span class="map-title">> pillar_map.exe</span>
            <button class="text-btn" onclick="showRitual()">[ back ]</button>
        </div>
        <div id="pillars-grid"></div>
    </div>

    <script>
        // ── Typewriter ──────────────────────────────────────────────────────
        function typeText(elementId, text, speed, onDone) {
            const el = document.getElementById(elementId);
            let i = 0;
            const interval = setInterval(() => {
                el.textContent += text[i++];
                if (i >= text.length) {
                    clearInterval(interval);
                    if (onDone) onDone();
                }
            }, speed);
        }

        function runWelcomeSequence() {
            typeText('wl-1', 'Welcome, Neo.', 70, () => {
                setTimeout(() => {
                    typeText('wl-2', 'Ready to invest in yourself?', 55, () => {
                        document.getElementById('wl-cursor').innerHTML = '';
                        document.getElementById('auth-box').style.opacity = '1';
                        document.getElementById('auth-email').focus();
                    });
                }, 500);
            });
        }

        // ── Session ─────────────────────────────────────────────────────────
        let userId = localStorage.getItem('architect_user_id');

        document.addEventListener('DOMContentLoaded', () => {
            runWelcomeSequence();
        });

        function authError(msg) {
            document.getElementById('auth-error').innerText = msg;
        }

        async function doLogin() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) { authError('Enter email and password.'); return; }
            authError('');
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (!res.ok) { authError('Wrong email or password.'); return; }
            const data = await res.json();
            userId = data.user_id;
            localStorage.setItem('architect_user_id', userId);
            showRitual();
        }

        async function doRegister() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!email || !password) { authError('Enter email and password.'); return; }
            if (password.length < 6) { authError('Password must be at least 6 characters.'); return; }
            authError('');
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (!res.ok) {
                const err = await res.json();
                authError(err.detail || 'Registration failed.');
                return;
            }
            const data = await res.json();
            userId = data.user_id;
            localStorage.setItem('architect_user_id', userId);
            showRitual();
        }

        async function showRitual() {
            hideAll();
            document.getElementById('screen-ritual').classList.remove('hidden');
            document.getElementById('morning-message').innerText = 'Loading your story...';
            document.getElementById('morning-view').classList.remove('hidden');
            try {
                const res = await fetch(`/ritual/morning/${userId}`);
                if (!res.ok) throw new Error(`Server error ${res.status}`);
                const data = await res.json();
                document.getElementById('morning-message').innerText = data.message;
            } catch (err) {
                document.getElementById('morning-message').innerText = 'Could not load your morning message. Check back in a moment.';
            }
        }

        function showEvening() {
            document.getElementById('morning-view').classList.add('hidden');
            document.getElementById('evening-view').classList.remove('hidden');
            document.getElementById('journal-input').value = '';
            const questions = [
                "Who in your life actually pushes you to be better, and who is just taking up space?",
                "If your income vanished tomorrow, how many days could you survive?",
                "When was the last time you felt peace without a screen or distraction?",
                "What is one skill you'd spend 10,000 hours mastering just for pride?",
                "Do the people closest to you feel seen and heard by you?",
                "What belief did you hold for years that you now know is wrong?",
                "If you disappeared tomorrow, what would the world actually miss?"
            ];
            document.getElementById('seed-question').innerText = questions[Math.floor(Math.random() * questions.length)];
        }

        async function submitJournal() {
            const content = document.getElementById('journal-input').value.trim();
            if (!content) { alert("Write something first."); return; }
            try {
                const res = await fetch('/ritual/evening', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, content: content })
                });
                if (!res.ok) throw new Error('Save failed');
                alert("Journal saved. See you in the morning.");
                showRitual();
            } catch (err) {
                alert("Something went wrong saving your journal. Try again.");
            }
        }

        async function showMap() {
            hideAll();
            document.getElementById('screen-map').classList.remove('hidden');
            const res = await fetch(`/user/pillars/${userId}`);
            const pillars = await res.json();
            const grid = document.getElementById('pillars-grid');
            grid.innerHTML = '';
            pillars.forEach(p => {
                const isMoving = p.status === 'Moving';
                const card = document.createElement('div');
                card.className = `pillar-card ${isMoving ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="pillar-name">${p.name}</div>
                    <div class="pillar-status ${isMoving ? 'moving' : 'paused'}">${p.status}</div>
                `;
                grid.appendChild(card);
            });
        }

        function hideAll() {
            ['screen-welcome','screen-ritual','screen-map','morning-view','evening-view']
                .forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            if (e.key === 'm') showMap();
            if (e.key === 'r') showRitual();
        });
    </script>
</body>
</html>
