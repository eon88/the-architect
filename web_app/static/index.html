<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHITECT_OS v1.0</title>
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00cc33;
    --green-faint: #003311;
    --green-glow: rgba(0,255,65,0.18);
    --bg: #0a0a0a;
    --panel-bg: rgba(0,20,8,0.92);
    --border: rgba(0,255,65,0.28);
    --red: #ff3333;
    --blue: #3399ff;
    --amber: #ffaa00;
    --text-dim: rgba(0,255,65,0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.13) 3px,
      rgba(0,0,0,0.13) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ─── GREETING SCREEN ─── */
  #screen-greeting {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  #boot-box {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel-bg);
    padding: 2.2rem 2.6rem;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 0 40px rgba(0,255,65,0.08);
  }

  #boot-log {
    min-height: 220px;
    font-size: .82rem;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--green-dim);
  }

  #boot-log .hl { color: var(--green); font-weight: bold; }

  #greeting-actions {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: .75rem;
    align-items: center;
  }

  #btn-red-pill {
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: inherit;
    font-size: clamp(.62rem, 2.5vw, .82rem);
    letter-spacing: .1em;
    padding: .65rem 1.6rem;
    cursor: pointer;
    border-radius: 3px;
    transition: background .2s, color .2s, border-color .2s;
    white-space: nowrap;
  }

  #btn-red-pill:hover, #btn-red-pill:active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  #btn-blue-pill {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: .74rem;
    cursor: pointer;
    letter-spacing: .06em;
    padding: .3rem .8rem;
    border-radius: 3px;
    transition: background .2s, color .2s;
  }

  #btn-blue-pill:hover, #btn-blue-pill:active {
    background: rgba(51,153,255,0.15);
    color: var(--blue);
  }

  /* ─── APP SHELL ─── */
  #app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  #app-header {
    padding: .55rem 1.2rem;
    border-bottom: 1px solid var(--border);
    font-size: .72rem;
    letter-spacing: .08em;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,10,4,0.98);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  #header-title { color: var(--green); font-weight: bold; }
  #header-date  { font-size: .68rem; }

  #app-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  #dashboard-placeholder {
    text-align: center;
    color: var(--text-dim);
    font-size: .78rem;
    letter-spacing: .08em;
    line-height: 2;
  }

  #dashboard-placeholder .cursor {
    display: inline-block;
    width: 8px;
    height: 1em;
    background: var(--green);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* ─── UTILITIES ─── */
  .hidden { display: none !important; }

  @media (max-width: 400px) {
    #boot-box { padding: 1.5rem 1.2rem; }
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════
     GREETING SCREEN
════════════════════════════════════════════════ -->
<div id="screen-greeting">
  <div id="boot-box">
    <div id="boot-log"></div>
    <div id="greeting-actions" class="hidden">
      <button id="btn-red-pill">[ TAKE THE RED PILL ]</button>
      <button id="btn-blue-pill">not today — blue pill</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════ -->
<div id="app" class="hidden">
  <header id="app-header">
    <span id="header-title">▸ ARCHITECT_OS v1.0</span>
    <span id="header-date"></span>
  </header>

  <div id="app-content">
    <div id="dashboard-placeholder">
      // DASHBOARD INITIALISING<br>
      <span class="cursor"></span>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  BOOT SEQUENCE
// ════════════════════════════════════════════════
const BOOT_LINES = [
  { text: 'ARCHITECT_OS v1.0 — initialising...',         delay: 60 },
  { text: 'loading core modules...',                      delay: 40 },
  { text: 'scanning pillar matrix... [7 pillars found]',  delay: 40 },
  { text: 'calibrating signal...',                        delay: 40 },
  { text: '---',                                          delay: 20 },
  { text: 'Welcome, Neo.',                                delay: 55 },
  { text: 'Ready to invest in yourself?',                 delay: 55 },
  { text: '---',                                          delay: 20 },
  { text: 'Choose your path:',                            delay: 40 },
];

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeText(el, text, charDelay) {
  if (text === '---') {
    el.innerHTML += '<span style="color:rgba(0,255,65,0.2)">───────────────────────────</span>\n';
    await sleep(charDelay * 4);
    return;
  }
  const isHl = text === 'Welcome, Neo.' || text === 'Ready to invest in yourself?';
  if (isHl) {
    el.innerHTML += '<span class="hl">';
    for (const ch of text) {
      el.innerHTML = el.innerHTML.slice(0, -'</span>'.length) + escHtml(ch) + '</span>';
      await sleep(charDelay);
    }
    el.innerHTML += '\n';
  } else {
    for (const ch of text) {
      el.innerHTML += escHtml(ch);
      await sleep(charDelay);
    }
    el.innerHTML += '\n';
  }
}

async function runBoot() {
  const log = document.getElementById('boot-log');
  for (const line of BOOT_LINES) {
    await typeText(log, line.text, line.delay);
    await sleep(120);
  }
  await sleep(300);
  document.getElementById('greeting-actions').classList.remove('hidden');
}

// ════════════════════════════════════════════════
//  GREETING ACTIONS
// ════════════════════════════════════════════════
document.getElementById('btn-red-pill').addEventListener('click', async function() {
  this.style.background    = 'var(--red)';
  this.style.borderColor   = 'var(--red)';
  this.style.color         = '#fff';
  await sleep(380);
  launchApp();
});

document.getElementById('btn-blue-pill').addEventListener('click', function() {
  window.close();
  document.getElementById('boot-log').innerHTML += '\n<span style="color:var(--blue)">connection terminated.</span>';
});

function launchApp() {
  document.getElementById('screen-greeting').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  updateHeaderDate();
}

function updateHeaderDate() {
  const d = new Date();
  const days   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('header-date').textContent =
    `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

runBoot();
</script>
</body>
</html>
