<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT_OS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root { --green: #00ff41; --dim: #003b00; --bg: #000; }

        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-y: auto;
        }

        /* scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── terminal container ── */
        .terminal {
            width: 100%;
            max-width: 680px;
            border: 1px solid var(--green);
            border-radius: 12px;
            padding: 32px 36px 36px;
            position: relative;
            box-shadow: 0 0 32px rgba(0,255,65,.08), inset 0 0 32px rgba(0,255,65,.02);
        }

        /* traffic-light dots */
        .dots {
            display: flex;
            gap: 7px;
            margin-bottom: 28px;
        }
        .dot {
            width: 11px; height: 11px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        /* ── boot log ── */
        .boot-log { margin-bottom: 28px; min-height: 120px; }

        .log-line {
            font-size: .78rem;
            letter-spacing: .04em;
            line-height: 1.9;
            color: var(--green);
            opacity: 0;
            white-space: pre;
        }
        .log-line.dim { color: var(--dim); }
        .log-line.visible { opacity: 1; }

        /* ── welcome block ── */
        .welcome { margin-bottom: 28px; }

        /* ── cursor ── */
        .cursor {
            display: inline-block;
            width: 9px; height: 1.1em;
            background: var(--green);
            vertical-align: text-bottom;
            animation: blink .85s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* ── button ── */
        .btn {
            display: block;
            padding: 13px 20px;
            font-family: inherit;
            font-size: clamp(.62rem, 2.5vw, .82rem);
            font-weight: bold;
            letter-spacing: .08em;
            white-space: nowrap;
            color: #000;
            background: var(--green);
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity .5s, transform .5s, background .25s, box-shadow .25s;
            text-shadow: none;
        }
        .btn.visible { opacity: 1; transform: translateY(0); }
        .btn:hover { background: #ff2020; box-shadow: 0 0 24px rgba(255,32,32,.5); }

        .pill-later {
            display: block;
            margin-top: 14px;
            font-size: .72rem;
            letter-spacing: .1em;
            color: #444;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            opacity: 0;
            padding: 6px 20px;
            border-radius: 999px;
            transition: opacity .5s, background .25s, box-shadow .25s;
        }
        .pill-later.visible { opacity: 1; }
        .pill-later:hover {
            background: #1a4aff;
            box-shadow: 0 0 18px rgba(26,74,255,.55);
        }

        /* ── inner screens ── */
        .screen { width: 100%; max-width: 680px; }
        .hidden { display: none !important; }

        .s-label {
            font-size: .62rem;
            color: #3a8a3a;
            letter-spacing: .22em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .ritual-msg {
            font-size: 1.05rem;
            line-height: 1.9;
            color: #d4f5d4;
            font-style: italic;
            margin-bottom: 40px;
        }

        .nav-link {
            font-size: .72rem;
            color: #3a7a3a;
            cursor: pointer;
            letter-spacing: .08em;
            background: none;
            border: none;
            font-family: inherit;
            text-decoration: underline;
            transition: color .2s;
        }
        .nav-link:hover { color: var(--green); }

        textarea.input {
            width: 100%;
            height: 140px;
            resize: none;
            background: rgba(0,255,65,.025);
            border: 1px solid #1e5a1e;
            color: #d4f5d4;
            font-family: inherit;
            font-size: .92rem;
            padding: 14px;
            outline: none;
            margin-bottom: 18px;
            line-height: 1.7;
            transition: border-color .2s;
        }
        textarea.input:focus { border-color: #3aaa3a; }
        textarea.input::placeholder { color: #1e4a1e; }

        .seed-q {
            font-size: .9rem;
            color: #8acc8a;
            margin-bottom: 18px;
            line-height: 1.75;
        }

        .submit-btn {
            display: inline-block;
            padding: 11px 32px;
            font-family: inherit;
            font-size: .78rem;
            font-weight: bold;
            letter-spacing: .14em;
            color: #000;
            background: var(--green);
            border: none;
            cursor: pointer;
            margin-bottom: 18px;
            transition: background .2s, box-shadow .2s;
        }
        .submit-btn:hover { background: #fff; box-shadow: 0 0 16px rgba(0,255,65,.3); }

        /* map */
        .map-title { font-size: .85rem; font-weight: bold; letter-spacing: .22em; color: #8acc8a; margin-bottom: 24px; }

        .pillars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 10px;
            margin-bottom: 28px;
        }

        .pillar-card {
            border: 1px solid #1e4a1e;
            padding: 16px 14px;
            min-height: 70px;
        }
        .pillar-card.moving { border-color: #3aaa3a; }
        .pillar-name {
            font-size: .68rem;
            font-weight: bold;
            letter-spacing: .06em;
            margin-bottom: 6px;
            color: #d4f5d4;
            word-break: break-word;
            line-height: 1.4;
        }
        .pillar-status { font-size: .58rem; letter-spacing: .15em; color: #3a7a3a; }
        .pillar-card.moving .pillar-status { color: var(--green); }
    </style>
</head>
<body>

<!-- ══ GREETING ══ -->
<div id="screen-greeting">
    <div class="terminal">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

        <div class="boot-log" id="boot-log"></div>

        <div class="welcome" id="welcome-block"></div>

        <button class="btn" id="begin-btn" onclick="enterApp()">[ TAKE THE RED PILL ]</button>
        <button class="pill-later" id="later-btn" onclick="takeBluePill()">later</button>
    </div>
</div>

<!-- ══ RITUAL ══ -->
<div id="screen-ritual" class="screen hidden">
    <div class="terminal">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div id="morning-view">
            <div class="s-label">// morning ritual</div>
            <div id="morning-message" class="ritual-msg">"..."</div>
            <button class="nav-link" onclick="showEvening()">evening journal →</button>
            &nbsp;&nbsp;
            <button class="nav-link" onclick="showMap()">pillar map →</button>
        </div>
        <div id="evening-view" class="hidden">
            <div class="s-label">// evening reflection</div>
            <div id="seed-question" class="seed-q"></div>
            <textarea id="journal-input" class="input" placeholder="> write here..."></textarea>
            <button class="submit-btn" onclick="submitJournal()">[ SUBMIT ]</button>
            <button class="nav-link" onclick="showMorning()">← back</button>
        </div>
    </div>
</div>

<!-- ══ MAP ══ -->
<div id="screen-map" class="screen hidden">
    <div class="terminal">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="map-title">// PILLAR MAP</div>
        <div id="pillars-grid" class="pillars-grid"></div>
        <button class="nav-link" onclick="showRitual()">← ritual</button>
    </div>
</div>

<script>
    const PILLARS = ["Social", "Financial", "Spiritual", "Craft/Career", "Emotional/Intimacy", "Intellectual", "Legacy"];

    // Seed questions mapped to pillars — shown in order, one per journal session
    const SEED_QUESTIONS = [
        { pillar: "Social",             q: "Who in your life actually pushes you to be better, and who is just taking up space?" },
        { pillar: "Financial",          q: "If your income vanished tomorrow, how many days could you survive before the panic sets in?" },
        { pillar: "Spiritual",          q: "When was the last time you felt a sense of peace that had nothing to do with a screen or a distraction?" },
        { pillar: "Craft/Career",       q: "If money were off the table, what is the one skill you would spend 10,000 hours mastering just for the pride of it?" },
        { pillar: "Emotional/Intimacy", q: "Do the people closest to you feel truly seen and heard by you, or are you just physically present in the room?" },
        { pillar: "Intellectual",       q: "What is a belief you held for years that you now know was completely wrong?" },
        { pillar: "Legacy",             q: "If you disappeared tomorrow, what is the one thing the world would actually miss about your presence?" },
    ];

    // Hero stories shown on morning ritual (per pillar, matching pipeline)
    const HERO_STORIES = {
        "Social":             "The Spartans didn't build walls around Sparta — they built men. A warrior without a tribe is just a man with a sword. Look around your circle. Are these men sharpening you, or are they comfortable with you staying dull?",
        "Financial":          "Marcus Aurelius ruled an empire worth more than anything you can put in a bank, and he slept on the same hard bed as his soldiers. His wealth was in his discipline, not his treasury. What one financial decision, made today, would the future version of you thank you for?",
        "Spiritual":          "The Stoics called it the inner citadel — a place inside you that no circumstance can reach. Epictetus was a slave. He had nothing. Yet no man owned his mind. The fog you're feeling isn't weakness. It's a signal. Give it direction.",
        "Craft/Career":       "Miyamoto Musashi fought 61 duels and never lost — not because he was born gifted, but because he treated every day as a training ground. He wrote: Do nothing that is of no use. The work in front of you today is the duel. Show up like it matters.",
        "Emotional/Intimacy": "Achilles, the greatest warrior of his age, was undone not by a sword but by grief — the loss of the one person who truly knew him. Strength without the capacity to feel is just armour with nobody inside. The people in your life deserve your presence, not just your proximity.",
        "Intellectual":       "Darwin spent 20 years quietly observing, reading, and thinking before he published a single word. His greatest weapon wasn't a lab — it was curiosity held long enough to become conviction. What idea have you been sitting with that's ready to be acted on?",
        "Legacy":             "Cincinnatus was given absolute power over Rome, defeated the enemy in 15 days, then returned to his farm. He didn't need the throne. He knew who he was building for. The question isn't what you want to achieve — it's what you want to leave behind.",
    };

    const DAY1_MESSAGE = "Welcome to Day 1. Your journey begins with a single step. Go do one thing today that the man you want to be would do.";

    /* ── state (localStorage) ── */
    function getState() {
        return {
            journalCount: parseInt(localStorage.getItem('arch_journal_count') || '0'),
            qIndex:       parseInt(localStorage.getItem('arch_q_index') || '0'),
            lastPillar:   localStorage.getItem('arch_last_pillar') || null,
        };
    }

    function saveState(patch) {
        const s = getState();
        Object.assign(s, patch);
        localStorage.setItem('arch_journal_count', s.journalCount);
        localStorage.setItem('arch_q_index', s.qIndex);
        if (s.lastPillar) localStorage.setItem('arch_last_pillar', s.lastPillar);
    }

    function getPillarStates() {
        const stored = localStorage.getItem('arch_pillar_states');
        if (stored) return JSON.parse(stored);
        const states = {};
        PILLARS.forEach(p => states[p] = 'PAUSED');
        return states;
    }

    function setPillarMoving(pillar) {
        const states = getPillarStates();
        states[pillar] = 'MOVING';
        localStorage.setItem('arch_pillar_states', JSON.stringify(states));
    }

    /* ── boot sequence ── */
    const BOOT_LINES = [
        { text: '> ARCHITECT_OS v1.0',          delay: 0,    pause: 320 },
        { text: '> LOADING CORE MODULES',        delay: 0,    pause: 0   },
        { text: '  [■■■■■■■■■■■■■■■■■■■■] OK',  delay: 480,  pause: 200 },
        { text: '> SCANNING USER PROFILE',       delay: 0,    pause: 0   },
        { text: '  [■■■■■■■■■■■■■■■■■■■■] OK',  delay: 560,  pause: 200 },
        { text: '> ESTABLISHING CONNECTION',     delay: 0,    pause: 0   },
        { text: '  [■■■■■■■■■■■■■■■■■■■■] OK',  delay: 400,  pause: 200 },
        { text: '> DECRYPTING IDENTITY...',      delay: 0,    pause: 640 },
        { text: '  STATUS: AUTHORIZED',          delay: 0,    pause: 900 },
        { text: '',                              delay: 0,    pause: 100 },
        { text: '> Welcome, Neo.',               delay: 0,    pause: 200, welcome: true },
        { text: '> Ready to invest in yourself?', delay: 0,   pause: 0,   welcome: true },
    ];

    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function typewriterLine(el, text, charDelay = 28) {
        el.classList.add('visible');
        for (let i = 0; i <= text.length; i++) {
            el.textContent = text.slice(0, i);
            await sleep(charDelay);
        }
    }

    async function runBoot() {
        const log = document.getElementById('boot-log');
        // add cursor line
        const cursorEl = document.createElement('div');
        cursorEl.className = 'log-line visible';
        cursorEl.innerHTML = '<span class="cursor"></span>';
        log.appendChild(cursorEl);

        const welcome = document.getElementById('welcome-block');

        for (const line of BOOT_LINES) {
            await sleep(line.delay || 0);
            const parent = line.welcome ? welcome : log;
            const el = document.createElement('div');
            el.className = 'log-line';
            parent === log ? log.insertBefore(el, cursorEl) : parent.appendChild(el);
            await typewriterLine(el, line.text, 22);
            await sleep(line.pause || 0);
        }

        // remove cursor, show buttons
        cursorEl.remove();
        await sleep(400);
        document.getElementById('begin-btn').classList.add('visible');
        document.getElementById('later-btn').classList.add('visible');
    }

    function takeBluePill() {
        window.close();
        // fallback if browser blocks window.close()
        document.body.innerHTML = '';
        document.body.style.background = '#000';
    }

    runBoot();

    /* ── navigation ── */
    function hideAll() {
        document.getElementById('screen-greeting').classList.add('hidden');
        document.getElementById('screen-ritual').classList.add('hidden');
        document.getElementById('screen-map').classList.add('hidden');
    }

    function pickMorningMessage() {
        const { journalCount, lastPillar } = getState();
        let msg;
        if (journalCount === 0) {
            msg = DAY1_MESSAGE;
        } else {
            const pillar = lastPillar || PILLARS[0];
            msg = HERO_STORIES[pillar] || DAY1_MESSAGE;
        }
        document.getElementById('morning-message').textContent = `"${msg}"`;
    }

    function enterApp() {
        hideAll();
        document.getElementById('screen-ritual').classList.remove('hidden');
        showMorning();
        pickMorningMessage();
    }

    function showRitual() {
        hideAll();
        document.getElementById('screen-ritual').classList.remove('hidden');
        showMorning();
        pickMorningMessage();
    }

    function showMorning() {
        document.getElementById('morning-view').classList.remove('hidden');
        document.getElementById('evening-view').classList.add('hidden');
    }

    function showEvening() {
        const { qIndex } = getState();
        const entry = SEED_QUESTIONS[qIndex % SEED_QUESTIONS.length];
        document.getElementById('morning-view').classList.add('hidden');
        document.getElementById('evening-view').classList.remove('hidden');
        document.getElementById('seed-question').innerHTML =
            `<span style="color:#3a7a3a;letter-spacing:.15em;font-size:.65rem">// ${entry.pillar.toUpperCase()}</span><br><br>${entry.q}`;
    }

    function submitJournal() {
        const content = document.getElementById('journal-input').value.trim();
        if (!content) return;
        document.getElementById('journal-input').value = '';
        const { journalCount, qIndex } = getState();
        const entry = SEED_QUESTIONS[qIndex % SEED_QUESTIONS.length];
        saveState({ journalCount: journalCount + 1, qIndex: qIndex + 1, lastPillar: entry.pillar });
        setPillarMoving(entry.pillar);
        showRitual();
    }

    function showMap() {
        hideAll();
        document.getElementById('screen-map').classList.remove('hidden');
        const grid = document.getElementById('pillars-grid');
        const states = getPillarStates();
        grid.innerHTML = '';
        PILLARS.forEach(name => {
            const status = states[name] || 'PAUSED';
            const card = document.createElement('div');
            card.className = `pillar-card${status === 'MOVING' ? ' moving' : ''}`;
            card.innerHTML = `<div class="pillar-name">${name.toUpperCase()}</div><div class="pillar-status">${status}</div>`;
            grid.appendChild(card);
        });
    }

    window.addEventListener('keydown', e => {
        if (document.activeElement.tagName === 'TEXTAREA' ||
            document.activeElement.tagName === 'INPUT') return;
        if (e.key === 'm') showMap();
        if (e.key === 'r') showRitual();
    });
</script>
</body>
</html>
