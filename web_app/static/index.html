<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT_OS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            color: #e5e5e5;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px
            );
            pointer-events: none;
            z-index: 999;
        }

        .screen { width: 100%; max-width: 420px; }
        .hidden { display: none !important; }

        .os-label {
            font-size: .75rem;
            color: #444;
            letter-spacing: .15em;
            margin-bottom: 48px;
        }

        .welcome-line {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: .9rem;
            color: #555;
            margin-bottom: 56px;
            letter-spacing: .03em;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-family: inherit;
            font-size: .85rem;
            font-weight: bold;
            letter-spacing: .14em;
            cursor: pointer;
            border: 1px solid #e5e5e5;
            background: transparent;
            color: #e5e5e5;
            transition: background .2s, color .2s;
        }
        .btn:hover { background: #e5e5e5; color: #000; }

        /* ── ritual ── */
        .ritual-label {
            font-size: .65rem;
            letter-spacing: .2em;
            color: #444;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .ritual-message {
            font-size: 1.05rem;
            line-height: 1.75;
            color: #ccc;
            font-style: italic;
            margin-bottom: 48px;
        }

        .nav-link {
            font-size: .75rem;
            color: #444;
            cursor: pointer;
            letter-spacing: .08em;
            background: none;
            border: none;
            font-family: inherit;
            text-decoration: underline;
            transition: color .2s;
        }
        .nav-link:hover { color: #ccc; }

        textarea.input {
            width: 100%;
            height: 160px;
            resize: none;
            background: transparent;
            border: 1px solid #222;
            color: #e5e5e5;
            font-family: inherit;
            font-size: .95rem;
            padding: 14px;
            outline: none;
            margin-bottom: 20px;
            transition: border-color .2s;
        }
        textarea.input:focus { border-color: #555; }

        .seed-q {
            font-size: .85rem;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* ── pillar map ── */
        .map-title {
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: .2em;
            color: #fff;
            margin-bottom: 28px;
        }

        .pillars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 32px;
        }

        .pillar-card {
            border: 1px solid #1a1a1a;
            padding: 16px 12px;
        }

        .pillar-name { font-size: .75rem; font-weight: bold; letter-spacing: .08em; margin-bottom: 4px; }
        .pillar-status { font-size: .6rem; letter-spacing: .15em; color: #444; }
    </style>
</head>
<body>

<!-- ══ GREETING ══ -->
<div id="screen-greeting" class="screen">
    <div class="os-label">&gt; ARCHITECT_OS v1.0</div>
    <div class="welcome-line">Welcome, Neo.</div>
    <div class="tagline">Ready to invest in yourself?</div>
    <button class="btn" onclick="showRitual()">[ BEGIN JOURNEY ]</button>
</div>

<!-- ══ RITUAL ══ -->
<div id="screen-ritual" class="screen hidden">
    <div class="os-label">&gt; ARCHITECT_OS v1.0</div>

    <div id="morning-view">
        <div class="ritual-label">// morning ritual</div>
        <div id="morning-message" class="ritual-message">"Loading..."</div>
        <button class="nav-link" onclick="showEvening()">evening journal →</button>
        &nbsp;&nbsp;
        <button class="nav-link" onclick="showMap()">pillar map →</button>
    </div>

    <div id="evening-view" class="hidden">
        <div class="ritual-label">// evening reflection</div>
        <div id="seed-question" class="seed-q"></div>
        <textarea id="journal-input" class="input" placeholder="write here..."></textarea>
        <button class="btn" style="margin-bottom:16px" onclick="submitJournal()">[ SUBMIT ]</button>
        <button class="nav-link" onclick="showMorning()">← back</button>
    </div>
</div>

<!-- ══ MAP ══ -->
<div id="screen-map" class="screen hidden">
    <div class="os-label">&gt; ARCHITECT_OS v1.0</div>
    <div class="map-title">// PILLAR MAP</div>
    <div id="pillars-grid" class="pillars-grid"></div>
    <button class="nav-link" onclick="showRitual()">← ritual</button>
</div>

<script>
    const PILLARS = ["Social", "Financial", "Spiritual", "Craft/Career", "Emotional/Intimacy", "Intellectual", "Legacy"];

    const MORNING_MESSAGES = [
        "Welcome to Day 1. Your journey begins with a single step. Go do one thing today that the man you want to be would do.",
        "The Stoics taught that clarity comes from action, not from thinking.",
        "Discipline is the bridge between goals and accomplishment.",
        "The Spartans knew that a man alone is a target, but a man with a tribe is a force.",
        "Marcus Aurelius proved that true security comes from the strength of the mind, not the size of the treasury.",
        "The man who moves a mountain begins by carrying away small stones.",
        "You do not rise to the level of your goals. You fall to the level of your systems."
    ];

    const SEED_QUESTIONS = [
        "Who in your life actually pushes you to be better, and who is just taking up space?",
        "If your income vanished tomorrow, how many days could you survive?",
        "When was the last time you felt peace without a screen or distraction?",
        "What is one skill you'd spend 10,000 hours mastering just for pride?",
        "Do the people closest to you feel seen and heard by you?",
        "What belief did you held for years that you now know is wrong?",
        "If you disappeared tomorrow, what would the world actually miss?"
    ];

    function hideAll() {
        document.getElementById('screen-greeting').classList.add('hidden');
        document.getElementById('screen-ritual').classList.add('hidden');
        document.getElementById('screen-map').classList.add('hidden');
    }

    function showRitual() {
        hideAll();
        document.getElementById('screen-ritual').classList.remove('hidden');
        showMorning();
        const msg = MORNING_MESSAGES[Math.floor(Math.random() * MORNING_MESSAGES.length)];
        document.getElementById('morning-message').textContent = `"${msg}"`;
    }

    function showMorning() {
        document.getElementById('morning-view').classList.remove('hidden');
        document.getElementById('evening-view').classList.add('hidden');
    }

    function showEvening() {
        document.getElementById('morning-view').classList.add('hidden');
        document.getElementById('evening-view').classList.remove('hidden');
        const q = SEED_QUESTIONS[Math.floor(Math.random() * SEED_QUESTIONS.length)];
        document.getElementById('seed-question').textContent = q;
    }

    function submitJournal() {
        document.getElementById('journal-input').value = '';
        showRitual();
    }

    function showMap() {
        hideAll();
        document.getElementById('screen-map').classList.remove('hidden');
        const grid = document.getElementById('pillars-grid');
        grid.innerHTML = '';
        PILLARS.forEach(name => {
            const card = document.createElement('div');
            card.className = 'pillar-card';
            card.innerHTML = `<div class="pillar-name">${name.toUpperCase()}</div><div class="pillar-status">PAUSED</div>`;
            grid.appendChild(card);
        });
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'm') showMap();
        if (e.key === 'r') showRitual();
        if (e.key === 'Escape') { hideAll(); document.getElementById('screen-greeting').classList.remove('hidden'); }
    });
</script>
</body>
</html>
