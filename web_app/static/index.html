<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pillar-card { transition: all 0.3s ease; }
        .pillar-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.3); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- LOGIN SCREEN -->
    <div id="screen-login" class="text-center max-w-md w-full">
        <h1 class="text-5xl font-black tracking-tighter mb-8">THE ARCHITECT</h1>
        <p class="text-gray-400 mb-12 text-lg">Design your life. Master your pillars.</p>

        <div id="auth-register" class="">
            <input id="input-name" type="text" placeholder="Your name" class="w-full mb-4 px-6 py-4 bg-transparent border border-gray-700 rounded-full text-white placeholder-gray-600 focus:border-white outline-none transition text-base" />
            <input id="input-email" type="email" placeholder="Your email" class="w-full mb-6 px-6 py-4 bg-transparent border border-gray-700 rounded-full text-white placeholder-gray-600 focus:border-white outline-none transition text-base" />
            <button onclick="register()" class="w-full py-4 bg-white text-black font-bold rounded-full hover:bg-gray-200 transition duration-300 text-lg mb-4">
                Begin Journey
            </button>
            <p class="text-gray-600 text-sm">Already have an account? <span onclick="showLoginForm()" class="text-gray-400 underline cursor-pointer hover:text-white">Sign in</span></p>
        </div>

        <div id="auth-login" class="hidden">
            <input id="input-login-email" type="email" placeholder="Your email" class="w-full mb-6 px-6 py-4 bg-transparent border border-gray-700 rounded-full text-white placeholder-gray-600 focus:border-white outline-none transition text-base" />
            <button onclick="login()" class="w-full py-4 bg-white text-black font-bold rounded-full hover:bg-gray-200 transition duration-300 text-lg mb-4">
                Sign In
            </button>
            <p class="text-gray-600 text-sm">New here? <span onclick="showRegisterForm()" class="text-gray-400 underline cursor-pointer hover:text-white">Create account</span></p>
        </div>

        <p id="auth-error" class="hidden mt-4 text-red-400 text-sm"></p>
    </div>

    <!-- RITUAL SCREEN -->
    <div id="screen-ritual" class="hidden w-full max-w-2xl text-center">
        <div id="morning-view" class="hidden">
            <span class="text-xs uppercase tracking-widest text-gray-500 mb-4 block">Morning Ritual</span>
            <h2 id="morning-message" class="text-3xl font-medium leading-relaxed mb-12 italic">"Loading your story..."</h2>
            <button onclick="showEvening()" class="text-sm text-gray-500 underline hover:text-white transition">Evening Journal</button>
        </div>

        <div id="evening-view" class="hidden">
            <span class="text-xs uppercase tracking-widest text-gray-500 mb-4 block">Evening Reflection</span>
            <p id="seed-question" class="text-xl mb-8">How was your day?</p>
            <textarea id="journal-input" class="w-full h-48 p-6 bg-transparent border-2 border-gray-800 rounded-2xl focus:border-white outline-none transition text-lg" placeholder="Write here..."></textarea>
            <button onclick="submitJournal()" class="mt-8 px-12 py-4 bg-white text-black font-bold rounded-full hover:bg-gray-200 transition duration-300">
                Submit
            </button>
        </div>
    </div>

    <!-- MAP SCREEN -->
    <div id="screen-map" class="hidden w-full max-w-4xl">
        <div class="flex justify-between items-end mb-12">
            <h2 class="text-4xl font-black tracking-tighter">PILLAR MAP</h2>
            <button onclick="showRitual()" class="text-sm text-gray-400 hover:text-white">Back to Ritual</button>
        </div>
        <div id="pillars-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Pillars injected here -->
        </div>
    </div>

    <script>
        let userId = null;

        function showRegisterForm() {
            document.getElementById('auth-register').classList.remove('hidden');
            document.getElementById('auth-login').classList.add('hidden');
            document.getElementById('auth-error').classList.add('hidden');
        }

        function showLoginForm() {
            document.getElementById('auth-register').classList.add('hidden');
            document.getElementById('auth-login').classList.remove('hidden');
            document.getElementById('auth-error').classList.add('hidden');
        }

        function showAuthError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        async function register() {
            const name = document.getElementById('input-name').value.trim();
            const email = document.getElementById('input-email').value.trim();
            if (!email) { showAuthError('Please enter your email.'); return; }
            document.getElementById('auth-error').classList.add('hidden');
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, name: name || 'Architect' })
            });
            if (res.status === 409) { showAuthError('Account already exists. Sign in instead.'); showLoginForm(); return; }
            if (!res.ok) { const d = await res.json(); showAuthError(d.detail || 'Registration failed.'); return; }
            const data = await res.json();
            userId = data.user_id;
            showRitual();
        }

        async function login() {
            const email = document.getElementById('input-login-email').value.trim();
            if (!email) { showAuthError('Please enter your email.'); return; }
            document.getElementById('auth-error').classList.add('hidden');
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });
            if (res.status === 404) { showAuthError('No account found. Register first.'); showRegisterForm(); return; }
            if (!res.ok) { const d = await res.json(); showAuthError(d.detail || 'Login failed.'); return; }
            const data = await res.json();
            userId = data.user_id;
            showRitual();
        }

        async function showRitual() {
            hideAll();
            document.getElementById('screen-ritual').classList.remove('hidden');
            
            // Try to show morning first
            const res = await fetch(`/ritual/morning/${userId}`);
            const data = await res.json();
            document.getElementById('morning-message').innerText = data.message;
            document.getElementById('morning-view').classList.remove('hidden');
        }

        function showEvening() {
            document.getElementById('morning-view').classList.add('hidden');
            document.getElementById('evening-view').classList.remove('hidden');
            
            const questions = [
                "Who in your life actually pushes you to be better, and who is just taking up space?",
                "If your income vanished tomorrow, how many days could you survive?",
                "When was the last time you felt peace without a screen or distraction?",
                "What is one skill you'd spend 10,000 hours mastering just for pride?",
                "Do the people closest to you feel seen and heard by you?",
                "What belief did you hold for years that you now know is wrong?",
                "If you disappeared tomorrow, what would the world actually miss?"
            ];
            document.getElementById('seed-question').innerText = questions[Math.floor(Math.random() * questions.length)];
        }

        async function submitJournal() {
            const content = document.getElementById('journal-input').value;
            await fetch('/ritual/evening', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, content: content })
            });
            alert("Journal saved. See you in the morning.");
            showRitual();
        }

        async function showMap() {
            hideAll();
            document.getElementById('screen-map').classList.remove('hidden');
            const res = await fetch(`/user/pillars/${userId}`);
            const pillars = await res.json();
            
            const grid = document.getElementById('pillars-grid');
            grid.innerHTML = '';
            pillars.forEach(p => {
                const card = document.createElement('div');
                card.className = `pillar-card glass p-8 rounded-3xl text-center ${p.status === 'Moving' ? 'border-white' : 'border-gray-800'}`;
                card.innerHTML = `
                    <h3 class="text-xl font-bold mb-2">${p.name}</h3>
                    <span class="text-xs uppercase tracking-widest ${p.status === 'Moving' ? 'text-green-400' : 'text-gray-500'}">${p.status}</span>
                `;
                grid.appendChild(card);
            });
        }

        function hideAll() {
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-ritual').classList.add('hidden');
            document.getElementById('screen-map').classList.add('hidden');
            document.getElementById('morning-view').classList.add('hidden');
            document.getElementById('evening-view').classList.add('hidden');
        }
        
        // Add a keyboard shortcut for the map (since we have no buttons)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'm') showMap();
            if (e.key === 'r') showRitual();
        });
    </script>
</body>
</html>
