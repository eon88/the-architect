<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHITECT_OS v1.0</title>
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00cc33;
    --green-faint: #003311;
    --green-glow: rgba(0,255,65,0.18);
    --bg: #0a0a0a;
    --panel-bg: rgba(0,20,8,0.92);
    --border: rgba(0,255,65,0.28);
    --red: #ff3333;
    --blue: #3399ff;
    --amber: #ffaa00;
    --text-dim: rgba(0,255,65,0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.13) 3px,
      rgba(0,0,0,0.13) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ─── GREETING SCREEN ─── */
  #screen-greeting {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  #boot-box {
    border: 2px solid var(--green-dim);
    border-radius: 10px;
    background: #000;
    padding: 0;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 0 40px rgba(0,255,65,0.1), inset 0 0 60px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  #boot-titlebar {
    padding: .65rem 1rem;
    display: flex;
    gap: .45rem;
    align-items: center;
    border-bottom: 1px solid rgba(0,255,65,0.12);
  }

  .titlebar-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: rgba(0,255,65,0.25);
    border: 1px solid rgba(0,255,65,0.4);
  }

  #boot-body {
    padding: 1.8rem 2rem 2rem;
  }

  #boot-log {
    min-height: 240px;
    font-size: .82rem;
    line-height: 1.9;
    color: var(--green-dim);
  }

  #boot-log .line { display: flex; align-items: baseline; gap: .5rem; }
  #boot-log .prompt { color: var(--green); flex-shrink: 0; }
  #boot-log .hl { color: var(--green); font-weight: bold; }

  #boot-log .prog-row {
    display: flex;
    align-items: center;
    gap: .5rem;
    padding-left: 1.2rem;
    font-size: .78rem;
    margin-top: -.35rem;
    margin-bottom: .1rem;
  }

  #boot-log .prog-bar {
    display: inline-block;
    color: var(--green);
    letter-spacing: -.02em;
  }

  #boot-log .ok { color: var(--green); font-weight: bold; }

  #greeting-actions {
    margin-top: 1.8rem;
    display: flex;
    flex-direction: column;
    gap: .6rem;
    align-items: stretch;
  }

  #btn-red-pill {
    background: var(--green);
    border: none;
    color: #000;
    font-family: inherit;
    font-size: clamp(.7rem, 2.5vw, .88rem);
    font-weight: bold;
    letter-spacing: .12em;
    padding: .9rem 1.6rem;
    cursor: pointer;
    border-radius: 4px;
    transition: background .15s, box-shadow .15s;
    white-space: nowrap;
    text-align: center;
  }

  #btn-red-pill:hover { background: #00e639; box-shadow: 0 0 18px rgba(0,255,65,0.4); }
  #btn-red-pill:active { background: var(--red); color: #fff; }

  #btn-blue-pill {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: .74rem;
    cursor: pointer;
    letter-spacing: .06em;
    padding: .3rem .8rem;
    text-align: center;
    transition: color .2s;
  }

  #btn-blue-pill:hover { color: var(--blue); }

  /* ─── APP SHELL ─── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  #app-header {
    padding: .5rem 1.2rem;
    border-bottom: 1px solid var(--border);
    font-size: .72rem;
    letter-spacing: .08em;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #000;
    flex-shrink: 0;
  }

  #header-title { color: var(--green); font-weight: bold; }
  #header-date  { font-size: .68rem; }

  /* ─── 3-COLUMN LAYOUT ─── */
  #dashboard {
    flex: 1;
    display: grid;
    grid-template-columns: 200px 1fr 200px;
    gap: 0;
    overflow: hidden;
    padding: 1.2rem;
    gap: 1rem;
  }

  .dash-panel {
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    background: #000;
    overflow: hidden;
  }

  /* Left nav */
  #panel-nav {
    display: flex;
    flex-direction: column;
    padding: 1.2rem 0;
  }

  .nav-item {
    padding: .9rem 1.4rem;
    font-size: .85rem;
    color: var(--green-dim);
    cursor: pointer;
    letter-spacing: .05em;
    transition: color .15s, background .15s;
    border-left: 2px solid transparent;
  }

  .nav-item:hover { color: var(--green); background: rgba(0,255,65,0.04); }
  .nav-item.active { color: var(--green); border-left-color: var(--green); }

  /* Center content */
  #panel-main {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #main-placeholder {
    color: var(--text-dim);
    font-size: .75rem;
    letter-spacing: .1em;
  }

  #main-placeholder .cursor {
    display: inline-block;
    width: 8px; height: 1em;
    background: var(--green);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Right mode switcher */
  #panel-modes {
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: 1.2rem 0;
  }

  .mode-item {
    padding: 1rem 1.2rem;
    font-size: 1rem;
    font-weight: bold;
    color: var(--green-dim);
    cursor: pointer;
    letter-spacing: .08em;
    text-align: center;
    transition: color .15s, background .15s;
    border-right: 2px solid transparent;
  }

  .mode-item:hover { color: var(--green); background: rgba(0,255,65,0.04); }
  .mode-item.active { color: var(--green); border-right-color: var(--green); }

  /* ─── UTILITIES ─── */
  .hidden { display: none !important; }

  @media (max-width: 600px) {
    #dashboard { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; padding: .6rem; gap: .6rem; }
    #boot-box  { padding: 1.5rem 1.2rem; }
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════
     GREETING SCREEN
════════════════════════════════════════════════ -->
<div id="screen-greeting">
  <div id="boot-box">
    <div id="boot-titlebar">
      <div class="titlebar-dot"></div>
      <div class="titlebar-dot"></div>
      <div class="titlebar-dot"></div>
    </div>
    <div id="boot-body">
      <div id="boot-log"></div>
      <div id="greeting-actions" class="hidden">
        <button id="btn-red-pill">[ TAKE THE RED PILL ]</button>
        <button id="btn-blue-pill">later</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════ -->
<div id="app" class="hidden">
  <header id="app-header">
    <span id="header-title">▸ ARCHITECT_OS v1.0</span>
    <span id="header-date"></span>
  </header>

  <div id="dashboard">

    <!-- LEFT: navigation -->
    <div class="dash-panel" id="panel-nav">
      <div class="nav-item active" onclick="selectNav(this)">vision board</div>
      <div class="nav-item"       onclick="selectNav(this)">pillars</div>
      <div class="nav-item"       onclick="selectNav(this)">journal</div>
      <div class="nav-item"       onclick="selectNav(this)">reminders</div>
    </div>

    <!-- CENTER: main content -->
    <div class="dash-panel" id="panel-main">
      <div id="main-placeholder">// SELECT A MODULE<span class="cursor"></span></div>
    </div>

    <!-- RIGHT: mode switcher -->
    <div class="dash-panel" id="panel-modes">
      <div class="mode-item active" onclick="selectMode(this)">ARCHITECT</div>
      <div class="mode-item"       onclick="selectMode(this)">ADMIN</div>
      <div class="mode-item"       onclick="selectMode(this)">DOER</div>
    </div>

  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  BOOT SEQUENCE
// ════════════════════════════════════════════════
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addLine(log, text, cls) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = `<span class="prompt">&gt;</span><span class="${cls || ''}">${escHtml(text)}</span>`;
  log.appendChild(div);
  return div;
}

function addSubLine(log, html) {
  const div = document.createElement('div');
  div.className = 'prog-row';
  div.innerHTML = html;
  log.appendChild(div);
  return div;
}

async function animateBar(container, ms) {
  const BAR_CHAR = '█';
  const WIDTH = 20;
  const span = document.createElement('span');
  span.className = 'prog-bar';
  container.innerHTML = '[';
  container.appendChild(span);
  container.innerHTML += '] <span class="ok" style="opacity:0">OK</span>';
  const okSpan = container.querySelector('.ok');

  for (let i = 0; i <= WIDTH; i++) {
    span.textContent = BAR_CHAR.repeat(i) + ' '.repeat(WIDTH - i);
    await sleep(ms / WIDTH);
  }
  okSpan.style.opacity = '1';
  await sleep(120);
}

async function typeLine(el, text, charDelay) {
  const span = el.querySelector('span:last-child');
  span.textContent = '';
  for (const ch of text) {
    span.textContent += ch;
    await sleep(charDelay);
  }
}

async function runBoot() {
  const log = document.getElementById('boot-log');

  // Line 1: ARCHITECT_OS v1.0
  const l1 = addLine(log, '', 'hl');
  await typeLine(l1, 'ARCHITECT_OS v1.0', 55);
  await sleep(150);

  // Line 2: LOADING CORE MODULES + bar
  const l2 = addLine(log, '', '');
  await typeLine(l2, 'LOADING CORE MODULES', 35);
  const b2 = addSubLine(log, '');
  await animateBar(b2, 600);
  await sleep(100);

  // Line 3: SCANNING USER PROFILE + bar
  const l3 = addLine(log, '', '');
  await typeLine(l3, 'SCANNING USER PROFILE', 35);
  const b3 = addSubLine(log, '');
  await animateBar(b3, 700);
  await sleep(100);

  // Line 4: ESTABLISHING CONNECTION + bar
  const l4 = addLine(log, '', '');
  await typeLine(l4, 'ESTABLISHING CONNECTION', 35);
  const b4 = addSubLine(log, '');
  await animateBar(b4, 800);
  await sleep(150);

  // Line 5: DECRYPTING IDENTITY...
  const l5 = addLine(log, '', '');
  await typeLine(l5, 'DECRYPTING IDENTITY...', 40);
  await sleep(200);

  // Sub: STATUS: AUTHORIZED
  const auth = addSubLine(log, '<span class="hl">STATUS: AUTHORIZED</span>');
  await sleep(400);

  // Blank gap
  log.appendChild(document.createElement('br'));

  // Welcome lines
  const lw1 = addLine(log, '', 'hl');
  await typeLine(lw1, 'Welcome, Neo.', 55);
  await sleep(120);

  const lw2 = addLine(log, '', 'hl');
  await typeLine(lw2, 'Ready to invest in yourself?', 45);
  await sleep(400);

  document.getElementById('greeting-actions').classList.remove('hidden');
}

// ════════════════════════════════════════════════
//  GREETING ACTIONS
// ════════════════════════════════════════════════
document.getElementById('btn-red-pill').addEventListener('click', async function() {
  this.style.background = '#ff3333';
  this.style.color      = '#fff';
  await sleep(320);
  launchApp();
});

document.getElementById('btn-blue-pill').addEventListener('click', function() {
  window.close();
  document.getElementById('boot-log').innerHTML += '\n<span style="color:var(--blue)">connection terminated.</span>';
});

function launchApp() {
  document.getElementById('screen-greeting').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  updateHeaderDate();
}

function selectNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

function selectMode(el) {
  document.querySelectorAll('.mode-item').forEach(m => m.classList.remove('active'));
  el.classList.add('active');
}

function updateHeaderDate() {
  const d = new Date();
  const days   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('header-date').textContent =
    `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

runBoot();
</script>
</body>
</html>
