name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt httpx==0.26.0 pytest

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite:///./ci_test.db
